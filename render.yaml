# Render Blueprint for one-click deployment
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: washmen-virtual-teammate
    runtime: python
    plan: starter   # $7/month, always-on (required for reliable Asana webhooks)
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webhook_server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: ASANA_PAT
        sync: false   # set manually in dashboard (secret)
      - key: ASANA_PROJECT_GID
        value: "1202289964354061"
