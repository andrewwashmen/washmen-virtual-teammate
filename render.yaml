# Render Blueprint for one-click deployment
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: washmen-virtual-teammate
    runtime: python
    plan: starter   # $7/month, always-on (required for reliable Asana webhooks)
    buildCommand: pip install -r requirements.txt
    # Single worker keeps the per-task in-flight lock authoritative; multi-worker
    # would need cross-process coordination (Redis) and the volume doesn't warrant it.
    startCommand: gunicorn webhook_server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: ASANA_PAT
        sync: false   # set manually in dashboard (secret)
      - key: ASANA_PROJECT_GID
        value: "1202289964354061"
      - key: SLACK_WEBHOOK_URL
        sync: false   # set manually; notifications silently no-op if unset

  # Reconciler: runs hourly, finds tasks with the Lovable link in notes
  # but no Approved/Rejected marker, and runs process_task on each. Pure
  # safety net — under normal operation it finds nothing because the
  # live webhook handles every event. Catches missed events from Render
  # restarts, network blips, or webhook delivery failures.
  - type: cron
    name: washmen-virtual-teammate-reconciler
    runtime: python
    plan: starter
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python reconcile_missed.py
    envVars:
      - key: ASANA_PAT
        sync: false
      - key: ASANA_PROJECT_GID
        value: "1202289964354061"
      - key: SLACK_WEBHOOK_URL
        sync: false

  # Sync reconciler: runs every 15 minutes, finds already-processed tasks
  # whose stored Snapshot key differs from Supabase's current state, and
  # runs sync_task on each. Safety net for the case where Lovable updates
  # Supabase but doesn't post the `Approval link:` trigger comment.
  - type: cron
    name: washmen-virtual-teammate-sync-reconciler
    runtime: python
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python reconcile_changes.py
    envVars:
      - key: ASANA_PAT
        sync: false
      - key: ASANA_PROJECT_GID
        value: "1202289964354061"
      - key: SLACK_WEBHOOK_URL
        sync: false

  # Daily metrics: once a day at 00:00 UTC, fetches the web service's
  # /metrics endpoint and posts a formatted summary to the same Slack
  # channel that receives error alerts. Counters are process-local to the
  # web worker and reset on Render restarts — treat numbers as a quick
  # health snapshot, not a strict 24h window.
  - type: cron
    name: washmen-virtual-teammate-daily-metrics
    runtime: python
    plan: starter
    schedule: "0 0 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python daily_metrics_report.py
    envVars:
      - key: METRICS_URL
        value: "https://washmen-virtual-teammate.onrender.com/metrics"
      - key: SLACK_WEBHOOK_URL
        sync: false
